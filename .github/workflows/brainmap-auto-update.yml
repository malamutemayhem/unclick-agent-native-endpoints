name: Brainmap Auto Update

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: brainmap-auto-update
  cancel-in-progress: true

jobs:
  brainmap:
    name: Regenerate ecosystem Brainmap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Generate Brainmap
        run: npm run brainmap:generate
      - name: Verify Brainmap
        run: npm run test:brainmap
      - name: Commit generated Brainmap
        run: |
          if git diff --quiet -- docs/UnClick-brainmap.generated.md; then
            echo "Brainmap already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/UnClick-brainmap.generated.md
          git commit -m "docs: auto-update ecosystem brainmap"
          git push
