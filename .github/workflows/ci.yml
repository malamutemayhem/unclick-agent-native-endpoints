name: CI

# Runs on every PR, on push to main, AND on push to the development branch.
# Catches broken builds, type errors, and lint regressions before they ship.
# Non-blocking for unit tests since the suite is still young, but they run
# so failures are visible.

on:
  pull_request:
  push:
    branches:
      - main
      - claude/setup-malamute-mayhem-zkquO

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Website (root package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test --if-present
        continue-on-error: true

  mcp-server:
    name: MCP server package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/mcp-server/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck + build
        run: npm run build
