name: CI

# Runs on every PR and on push to main. Catches broken builds, type errors,
# and lint regressions before they ship. Non-blocking for unit tests since
# the suite is still young, but they run so failures are visible.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Website (root package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test --if-present
        continue-on-error: true

  mcp-server:
    name: MCP server package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck + build
        run: npm run build
      - name: Tests
        run: npm test
        continue-on-error: true
