name: Auto-close Fishbowl todo on PR merge

# When a PR merges, scan its body and commit messages for
# "Closes UnClick todo: <uuid>" markers, with the older "Closes Fishbowl todo"
# marker still accepted for compatibility. POST each match to the existing
# memory-admin fishbowl_complete_todo action. Manual dispatch accepts explicit
# merged PR numbers for bounded reconciliation. A Fishbowl outage must NOT
# block merge cleanup, so the job always exits 0 even if the API call fails.

on:
  pull_request:
    types: [closed]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: Comma or space separated merged PR numbers to reconcile.
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  close-todos:
    name: Close linked Fishbowl todos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract todo ids and call memory-admin
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          UNCLICK_API_KEY: ${{ secrets.FISHBOWL_AUTOCLOSE_TOKEN }}
          API_URL: https://unclick.world/api/memory-admin
          AGENT_ID: github-action-autoclose
        shell: bash
        run: |
          # No -e: a single bad id or transport blip should not fail the job.
          set -uo pipefail

          if [ -z "${UNCLICK_API_KEY:-}" ]; then
            echo "::warning::FISHBOWL_AUTOCLOSE_TOKEN secret not set - skipping."
            exit 0
          fi

          MANUAL_PR_NUMBERS=$(jq -r '.inputs.pr_numbers // ""' "${GITHUB_EVENT_PATH}")
          PR_BODY=$(jq -r '.pull_request.body // ""' "${GITHUB_EVENT_PATH}")
          PR_NUMBER=$(jq -r '.pull_request.number // ""' "${GITHUB_EVENT_PATH}")
          PR_MERGED=$(jq -r '.pull_request.merged // false' "${GITHUB_EVENT_PATH}")

          PR_NUMBERS=()
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            mapfile -t PR_NUMBERS < <(printf '%s\n' "${MANUAL_PR_NUMBERS:-}" \
              | tr ',;' '  ' \
              | grep -Eo '[0-9]+' \
              | sort -n -u)

            if [ "${#PR_NUMBERS[@]}" -eq 0 ]; then
              echo "::warning::No PR numbers supplied for manual reconciliation."
              exit 0
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            mapfile -t PR_NUMBERS < <(gh api \
              -H "Accept: application/vnd.github.groot-preview+json" \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '.[] | select(.merged_at != null) | .number' \
              2>/tmp/gh-pr-lookup.err | sort -n -u) || {
                echo "::warning::Could not resolve merged PR for ${GITHUB_SHA}: $(cat /tmp/gh-pr-lookup.err)"
                PR_NUMBERS=()
              }

            if [ "${#PR_NUMBERS[@]}" -eq 0 ]; then
              echo "No merged PR associated with push ${GITHUB_SHA} - nothing to close."
              exit 0
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ "${PR_MERGED}" != "true" ]; then
              echo "Pull request was closed without merge - nothing to close."
              exit 0
            fi
            PR_NUMBERS=("${PR_NUMBER}")
          else
            echo "Unsupported event ${GITHUB_EVENT_NAME} - nothing to close."
            exit 0
          fi

          if [ "${#PR_NUMBERS[@]}" -eq 0 ]; then
            echo "No PRs to inspect."
            exit 0
          fi

          # Match the canonical "Closes UnClick todo: <uuid>" marker and the
          # older "Closes Fishbowl todo: <uuid>" marker, case-insensitive,
          # allowing - or space between the words.
          UUID_RE='[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
          fail_count=0
          close_count=0

          for pr_number in "${PR_NUMBERS[@]}"; do
            pr_text="${PR_BODY:-}"
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              pr_text=$(gh pr view "${pr_number}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json body,commits,mergedAt \
                --jq 'if .mergedAt == null then "" else [(.body // ""), (.commits[]?.messageHeadline // ""), (.commits[]?.messageBody // "")] | join("\n") end' 2>/tmp/gh-pr-view.err) || {
                  echo "::warning::Could not read PR #${pr_number}: $(cat /tmp/gh-pr-view.err)"
                  fail_count=$((fail_count + 1))
                  continue
                }
            else
              pr_commits=$(gh pr view "${pr_number}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json commits \
                --jq '[.commits[]?.messageHeadline // "", .commits[]?.messageBody // ""] | join("\n")' 2>/tmp/gh-pr-view.err) || {
                  echo "::warning::Could not read commit messages for PR #${pr_number}: $(cat /tmp/gh-pr-view.err)"
                  pr_commits=""
                }
              pr_text="${pr_text}
${pr_commits}"
            fi

            if [ -z "${pr_text:-}" ]; then
              echo "PR #${pr_number} body/commit text empty or PR is not merged - nothing to close."
              continue
            fi

            mapfile -t IDS < <(printf '%s\n' "$pr_text" \
              | grep -Eio "closes[ -]+(unclick|fishbowl)[ -]+todo[[:space:]]*:[[:space:]]*${UUID_RE}" \
              | grep -Eio "${UUID_RE}" \
              | sort -u)

            if [ "${#IDS[@]}" -eq 0 ]; then
              echo "No UnClick/Fishbowl todo ids found in PR #${pr_number} body or commits."
              continue
            fi

            echo "Found ${#IDS[@]} todo id(s) in PR #${pr_number}: ${IDS[*]}"
            for id in "${IDS[@]}"; do
              echo "Closing todo ${id}"
              payload=$(jq -n --arg agent_id "$AGENT_ID" --arg todo_id "$id" \
                '{agent_id: $agent_id, todo_id: $todo_id}')
              curl_exit=0
              http=$(curl -sS -o resp.json -w "%{http_code}" \
                --connect-timeout 10 --max-time 30 \
                -X POST "${API_URL}?action=fishbowl_complete_todo" \
                -H "Authorization: Bearer ${UNCLICK_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$payload") || curl_exit=$?
              http="${http:-000}"
              echo "  HTTP ${http} (curl exit ${curl_exit})"
              if [ -f resp.json ]; then cat resp.json; echo; fi
              if [ "$curl_exit" -ne 0 ] || [ "$http" -ge 400 ] 2>/dev/null; then
                fail_count=$((fail_count + 1))
                echo "::warning::Failed to close todo ${id} (HTTP ${http})."
              else
                close_count=$((close_count + 1))
              fi
            done
          done

          # Always succeed - a Fishbowl outage must not paint a red X on a
          # cleanly merged PR. Surface failures via warnings only.
          echo "Closed ${close_count} Fishbowl todo(s)."
          if [ "$fail_count" -gt 0 ]; then
            echo "::warning::${fail_count} reconciliation call(s) failed."
          fi
          exit 0
