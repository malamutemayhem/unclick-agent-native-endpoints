name: Apply Supabase migrations

# Runs any new SQL files under supabase/migrations/** against the production
# Supabase project whenever they land on main. Removes the manual "open
# the SQL editor and paste" step.
#
# One-time setup (GitHub repo → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  - https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   - the xxxxx from xxxxx.supabase.co
#   SUPABASE_DB_PASSWORD   - database password (Dashboard → Database → Settings)
#
# Connection note: we force the *session pooler* (port 5432) via an explicit
# --db-url. The CLI's auto-selection sometimes picks the transaction pooler
# (port 6543), which doesn't support the DDL operations migrations need and
# returns a cryptic "unexpected EOF". Session pooler supports everything.
#
# Self-healing: if the remote DB has legacy migrations that pre-date the repo's
# migration directory, the CLI refuses to push. We catch that specific error,
# mark the orphans as reverted (bookkeeping only, DB data untouched), retry.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/apply-migrations.yml"
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_REGION: ap-southeast-2
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Build explicit session-pooler URL
        id: dburl
        run: |
          ENCODED_PW=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['SUPABASE_DB_PASSWORD'], safe=''))")
          HOST="aws-1-${SUPABASE_REGION}.pooler.supabase.com"
          URL="postgresql://postgres.${SUPABASE_PROJECT_REF}:${ENCODED_PW}@${HOST}:5432/postgres"
          # Mask the URL so the password can't leak in logs
          echo "::add-mask::$URL"
          echo "db_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Push pending migrations (self-healing)
        env:
          DB_URL: ${{ steps.dburl.outputs.db_url }}
        run: |
          set +e
          output=$(supabase db push --db-url "$DB_URL" --include-all --yes 2>&1)
          status=$?
          echo "$output"

          if [ $status -eq 0 ]; then
            echo "Migrations applied cleanly."
            exit 0
          fi

          # Detect the orphan-migration case. If present, extract the list of
          # version IDs the CLI wants marked reverted and repair them.
          if echo "$output" | grep -q "Remote migration versions not found"; then
            echo "Detected orphan legacy migrations on remote. Reconciling."
            ids=$(echo "$output" \
              | grep -oE 'supabase migration repair --status reverted [0-9 ]+' \
              | head -1 \
              | sed 's/supabase migration repair --status reverted //')
            if [ -z "$ids" ]; then
              echo "Could not extract migration IDs from CLI output. Bailing."
              exit 1
            fi
            echo "Marking as reverted: $ids"
            supabase migration repair --db-url "$DB_URL" --status reverted $ids || exit 1
            echo "Retrying push."
            supabase db push --db-url "$DB_URL" --include-all --yes
            exit $?
          fi

          # Some other error. Surface it.
          exit $status
