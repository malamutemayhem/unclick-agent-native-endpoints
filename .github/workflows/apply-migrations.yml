name: Apply Supabase migrations

# Runs any new SQL files under supabase/migrations/** against the production
# Supabase project whenever they land on main.
#
# Why the Management API and not the Supabase CLI:
# The CLI has to go through the Supabase pooler (Supavisor), which on free
# tier projects intermittently returns "Tenant or user not found" or trips
# its circuit breaker after a few failures. The Management API
# (api.supabase.com) talks to the database over Supabase's internal network,
# bypassing the pooler entirely. No DB password, no URL encoding, no ports.
#
# One-time setup (GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  - https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   - the xxxxx from xxxxx.supabase.co
#
# Bookkeeping: the workflow keeps a tiny `public._claude_migrations` table
# listing which versions have been applied. New migrations run; already-applied
# ones are skipped. Idempotent and re-runnable.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/apply-migrations.yml"
      - ".github/scripts/apply_migrations.py"
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6

      - name: Apply pending migrations via Management API
        run: python3 .github/scripts/apply_migrations.py
